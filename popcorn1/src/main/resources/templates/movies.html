<head>    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<div th:fragment="content">

    <section class="section">

        <h2>🎬 All Movies</h2>

        <div class="scroll-row">

            <a th:each="movie : ${movies}"
               th:href="@{'/movie/' + ${movie.id}}"
               class="movie-card">

                <span class="rank-badge"
                      th:text="${movie.rank}">
                </span>

                <img class="movie-poster"
                     th:src="@{'/images/' + ${movie.poster}}"
                     th:alt="${movie.title}">

                <div class="movie-info">



                    <div class="movie-rating">
                        ★ <span th:text="${movie.rate}"></span>
                    </div>

                </div>

            </a>

        </div>

    </section>

</div>
