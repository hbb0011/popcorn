<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>AddMovies</title>
    <link rel="stylesheet" th:href="@{/css/register.css}">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">

        <h1>Add Movie</h1>

        <form method="post" th:action="@{/add}"  class="auth-form">
            <label>Movie Name</label>
            <input type="text" name="movie_name" required>

            <button type="submit" class="auth-submit">Fetch & Add</button>
        </form>

    </div>
</div>

</body>
</html>
