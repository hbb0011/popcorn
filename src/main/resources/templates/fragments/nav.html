<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<nav th:fragment="nav">
    <a th:href="@{/}" class="logo"><span>🍿</span> Popcorn</a>
    <ul class="nav-links">
        <li>
            <a th:href="@{/}" th:classappend="${activeNav == 'home'} ? 'active'">Home</a>
        </li>
        <li>
            <a th:href="@{/list}" th:classappend="${activeNav == 'list'} ? 'active'">Movies</a>
        </li>
        <li><a th:href="@{/watchlist}">Watchlist</a></li>
        <li><a th:href="@{/community}">Community</a></li>
        <li sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/admin/movie/create}" th:classappend="${activeNav == 'admin'} ? 'active'">add movies</a>
        </li>
        <li sec:authorize="isAuthenticated()">
            <a href="#">[[${#authentication.principal.name}]]</a>
        </li>
        <li sec:authorize="isAuthenticated()">
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="nav-logout-btn">Logout</button>
            </form>
        </li>
        <li sec:authorize="!isAuthenticated()">
            <a th:href="@{/login}">Login</a>
        </li>
        <li sec:authorize="!isAuthenticated()">
            <a th:href="@{/register}">Register</a>
        </li>
    </ul>
    <div class="nav-actions">
        <span sec:authorize="isAuthenticated()" class="nav-user-name" th:text="${#authentication.principal.name}">User</span>
        <div sec:authorize="isAuthenticated()" class="nav-avatar"
             th:text="${#strings.toUpperCase(#strings.substring(#authentication.principal.name,0,1))}">U</div>
        <a sec:authorize="!isAuthenticated()" th:href="@{/login}" class="nav-auth-link">Login</a>
        <a sec:authorize="!isAuthenticated()" th:href="@{/register}" class="nav-auth-link">Register</a>
    </div>
</nav>
</html>
