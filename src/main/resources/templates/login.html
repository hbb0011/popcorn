<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<section class="auth-page">
    <div class="auth-card">
        <h1>Welcome Back</h1>
        <p>Log in to continue your movie journey.</p>
        <form th:action="@{/login}" method="post" class="auth-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <label for="email">Email</label>
            <input id="email" type="email" name="email" placeholder="you@example.com" required autocomplete="username">
            <label for="password">Password</label>
            <input id="password" type="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
            <div class="auth-error" th:if="${param.error != null}">Invalid credentials</div>
            <div class="auth-error" th:if="${param.logout != null}">You have been logged out.</div>
            <button type="submit" class="auth-submit">Login</button>
        </form>
        <a th:href="@{/register}" class="auth-link">Don't have an account? Create one</a>
    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
