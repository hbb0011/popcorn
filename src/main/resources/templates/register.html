<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<section class="auth-page">
    <div class="auth-card">
        <h1>Create Account</h1>
        <p>Join Popcorn and start tracking your favorite films.</p>
        <form th:action="@{/register}" method="post" class="auth-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <label for="name">Name</label>
            <input id="name" type="text" name="name" placeholder="Your full name" required th:value="${name}">
            <label for="email">Email</label>
            <input id="email" type="email" name="email" placeholder="you@example.com" required th:value="${email}">
            <label for="password">Password</label>
            <input id="password" type="password" name="password" placeholder="At least 6 characters" required>
            <label for="password_confirmation">Confirm Password</label>
            <input id="password_confirmation" type="password" name="password_confirmation" placeholder="Repeat your password" required>
            <div class="auth-error" th:if="${error}" th:text="${error}"></div>
            <button type="submit" class="auth-submit">Create Account</button>
        </form>
        <a th:href="@{/login}" class="auth-link">Already have an account? Login</a>
    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
