<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="admin-container">
    <div class="admin-card">
        <h1 class="admin-title">🍿 Add New Movie</h1>
        <p class="admin-subtitle">Type a movie name and Popcorn will fetch the data automatically.</p>
        <div class="auth-error" th:if="${error}" th:text="${error}"></div>
        <form th:action="@{/admin/movie/store}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-group">
                <label for="movie_name">Movie Name</label>
                <input id="movie_name" type="text" name="movie_name" placeholder="Interstellar" required>
            </div>
            <button type="submit" class="submit-btn">Add Movie</button>
        </form>
    </div>
</div>

<style>
    .admin-container {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #0b0b0f;
        padding: 110px 40px 40px;
    }

    .admin-card {
        width: 100%;
        max-width: 500px;
        background: #14141c;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 30px rgba(250, 204, 21, 0.05);
    }

    .admin-title {
        color: #facc15;
        font-size: 42px;
        margin-bottom: 10px;
    }

    .admin-subtitle {
        color: #9ca3af;
        margin-bottom: 35px;
        line-height: 1.6;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 25px;
    }

    .form-group label {
        color: white;
        font-weight: 600;
    }

    .form-group input {
        background: #0f0f14;
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: white;
        padding: 16px;
        border-radius: 12px;
        font-size: 16px;
        outline: none;
        transition: 0.3s;
    }

    .form-group input:focus {
        border-color: #facc15;
        box-shadow: 0 0 15px rgba(250, 204, 21, 0.2);
    }

    .submit-btn {
        width: 100%;
        background: linear-gradient(135deg, #facc15, #f97316);
        border: none;
        padding: 16px;
        border-radius: 14px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    .submit-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(249, 115, 22, 0.35);
    }
</style>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
